services:
  ironveil:
    build:
      context: .
      dockerfile: Dockerfile
    image: ironveil-chronicles:latest
    container_name: ironveil
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
