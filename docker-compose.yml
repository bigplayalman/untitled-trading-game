services:
  ironveil:
    build:
      context: .
      dockerfile: Dockerfile
    image: ironveil-chronicles:latest
    container_name: ironveil
    restart: unless-stopped
    ports:
      - '${LOCAL_PORT:-8080}:80'
    expose:
      - '80'
    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - 'http://127.0.0.1:80/'
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
